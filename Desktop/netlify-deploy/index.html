<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽烟日记</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#0a1628;--bg-card:#111d33;--bg-card2:#162340;
  --blue-primary:#4a9eff;--blue-light:#6cb4ff;--blue-dim:#2a5a8f;
  --blue-glow:rgba(74,158,255,.15);--blue-glow2:rgba(74,158,255,.08);
  --white:#f0f4f8;--white-dim:#b0c4d8;--white-muted:#6889a8;
  --danger:#ff6b6b;--success:#4ecdc4;--warning:#ffd93d;
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-deep);color:var(--white);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;position:relative}

.topbar{padding:18px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--blue-light),var(--white));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .user-switch{display:flex;align-items:center;gap:8px}
.user-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--blue-dim);background:transparent;color:var(--white-dim);font-size:13px;cursor:pointer;transition:.2s}
.user-btn.active{background:var(--blue-primary);border-color:var(--blue-primary);color:#fff;font-weight:600}

.content{flex:1;overflow-y:auto;padding:0 16px 16px;scroll-behavior:smooth}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--blue-dim);border-radius:4px}

.nav{display:flex;flex-shrink:0;background:var(--bg-card);border-top:1px solid rgba(74,158,255,.1);padding:6px 0 env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;cursor:pointer;transition:.2s;color:var(--white-muted)}
.nav-item.active{color:var(--blue-primary)}
.nav-item svg{width:22px;height:22px;margin-bottom:3px}
.nav-item span{font-size:11px}

.page{display:none;animation:fadeIn .3s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--bg-card);border-radius:var(--radius);padding:18px;margin-bottom:14px;border:1px solid rgba(74,158,255,.08)}
.card-title{font-size:14px;color:var(--white-dim);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title .icon{font-size:16px}

.record-hero{text-align:center;padding:30px 0 20px}
.record-hero .big-btn{width:140px;height:140px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--blue-primary),#7c5cff);color:#fff;font-size:22px;font-weight:700;cursor:pointer;box-shadow:0 0 40px rgba(74,158,255,.3),0 0 80px rgba(74,158,255,.1);transition:.15s;position:relative;overflow:hidden}
.record-hero .big-btn:active{transform:scale(.93);box-shadow:0 0 20px rgba(74,158,255,.2)}
.record-hero .big-btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);animation:rippleAnim .6s ease-out forwards;pointer-events:none}
@keyframes rippleAnim{from{width:0;height:0;opacity:1}to{width:300px;height:300px;opacity:0}}
.record-hero .hint{font-size:13px;color:var(--white-muted);margin-top:12px}

.location-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.loc-btn{padding:10px 4px;border-radius:var(--radius-xs);border:1.5px solid var(--blue-dim);background:transparent;color:var(--white-dim);font-size:12px;cursor:pointer;transition:.2s;text-align:center}
.loc-btn.active,.loc-btn:active{border-color:var(--blue-primary);background:var(--blue-glow);color:var(--white)}
.loc-custom{margin-top:8px}
.loc-custom input{width:100%;padding:10px 14px;border-radius:var(--radius-xs);border:1.5px solid var(--blue-dim);background:var(--bg-deep);color:var(--white);font-size:13px;outline:none;transition:.2s}
.loc-custom input:focus{border-color:var(--blue-primary)}

.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mood-btn{padding:12px 4px;border-radius:var(--radius-xs);border:1.5px solid var(--blue-dim);background:transparent;color:var(--white-dim);font-size:12px;cursor:pointer;transition:.2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.mood-btn .emoji{font-size:22px}
.mood-btn.active{border-color:var(--blue-primary);background:var(--blue-glow);color:var(--white)}

.note-input{width:100%;padding:12px 14px;border-radius:var(--radius-xs);border:1.5px solid var(--blue-dim);background:var(--bg-deep);color:var(--white);font-size:13px;outline:none;resize:none;height:60px;transition:.2s;font-family:inherit}
.note-input:focus{border-color:var(--blue-primary)}

.recent-list{max-height:280px;overflow-y:auto}
.recent-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(74,158,255,.06)}
.recent-item:last-child{border-bottom:none}
.recent-item .time{font-size:12px;color:var(--white-muted);width:52px;flex-shrink:0}
.recent-item .emoji{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.recent-item .info{flex:1;min-width:0}
.recent-item .info .loc{font-size:13px;color:var(--white)}
.recent-item .info .mood-label{font-size:11px;color:var(--white-muted)}
.recent-item .del-btn{background:none;border:none;color:var(--white-muted);cursor:pointer;font-size:16px;padding:4px 8px;transition:.2s}
.recent-item .del-btn:hover{color:var(--danger)}

.chart-wrap{position:relative;height:220px;margin:10px 0}
.chart-wrap.tall{height:260px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{background:var(--bg-card2);border-radius:var(--radius-sm);padding:14px;text-align:center}
.stat-box .val{font-size:24px;font-weight:700;color:var(--blue-light)}
.stat-box .label{font-size:11px;color:var(--white-muted);margin-top:2px}

.report-summary{text-align:center;padding:16px 0}
.report-summary .big-num{font-size:48px;font-weight:800;background:linear-gradient(135deg,var(--blue-light),#7c5cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.report-summary .big-label{font-size:14px;color:var(--white-muted);margin-top:4px}
.report-summary .sub-row{display:flex;justify-content:center;gap:20px;margin-top:10px}
.report-summary .sub-item{text-align:center}
.report-summary .sub-item .sub-val{font-size:18px;font-weight:700;color:var(--white)}
.report-summary .sub-item .sub-label{font-size:11px;color:var(--white-muted)}
.report-tabs{display:flex;gap:6px;margin-bottom:14px}
.report-tab{flex:1;padding:8px;border-radius:var(--radius-xs);border:1.5px solid var(--blue-dim);background:transparent;color:var(--white-dim);font-size:13px;cursor:pointer;transition:.2s;text-align:center}
.report-tab.active{background:var(--blue-primary);border-color:var(--blue-primary);color:#fff;font-weight:600}

.share-users{display:flex;gap:12px;margin-bottom:16px}
.share-user-card{flex:1;background:var(--bg-card2);border-radius:var(--radius-sm);padding:16px;text-align:center;cursor:pointer;border:2px solid transparent;transition:.2s}
.share-user-card.active{border-color:var(--blue-primary)}
.share-user-card .avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--blue-primary),#7c5cff);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 8px}
.share-user-card .uname{font-size:14px;font-weight:600}
.share-user-card .ucount{font-size:12px;color:var(--white-muted)}
.share-compare{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.share-compare .compare-box{background:var(--bg-card2);border-radius:var(--radius-sm);padding:14px;text-align:center}
.share-compare .compare-box .cval{font-size:28px;font-weight:700}
.share-compare .compare-box .clabel{font-size:11px;color:var(--white-muted)}
.u1-color{color:var(--blue-light)}
.u2-color{color:#c084fc}

.settings-section{margin-top:16px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(74,158,255,.06)}
.settings-row:last-child{border-bottom:none}
.settings-row .s-label{font-size:14px;color:var(--white)}
.settings-row .s-desc{font-size:11px;color:var(--white-muted)}
.settings-row input[type=text]{padding:8px 12px;border-radius:var(--radius-xs);border:1.5px solid var(--blue-dim);background:var(--bg-deep);color:var(--white);font-size:13px;outline:none;width:120px;text-align:right}
.settings-row input[type=text]:focus{border-color:var(--blue-primary)}
.btn{padding:10px 20px;border-radius:var(--radius-xs);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:var(--blue-primary);color:#fff}
.btn-primary:active{opacity:.8}
.btn-outline{background:transparent;border:1.5px solid var(--blue-dim);color:var(--white-dim)}
.btn-danger{background:transparent;border:1.5px solid var(--danger);color:var(--danger)}

.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:12px 24px;background:var(--bg-card2);border:1px solid var(--blue-primary);border-radius:var(--radius-sm);color:var(--white);font-size:14px;z-index:999;animation:toastIn .3s,toastOut .3s 1.7s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}

.empty{text-align:center;padding:30px 0;color:var(--white-muted);font-size:14px}
.empty .empty-icon{font-size:40px;margin-bottom:8px}

.loading{text-align:center;padding:20px;color:var(--white-muted);font-size:13px}

@media(min-width:600px){.app{border-left:1px solid rgba(74,158,255,.08);border-right:1px solid rgba(74,158,255,.08)}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>🚬 抽烟日记</h1>
    <div class="user-switch" id="topUserSwitch"></div>
  </div>

  <div class="content">
    <div class="page active" id="pageRecord">
      <div class="record-hero">
        <button class="big-btn" id="smokeBtn" onclick="addRecord()">点烟了</button>
        <div class="hint">点一下，记录这一根</div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">📍</span>在哪儿</div>
        <div class="location-grid" id="locationGrid"></div>
        <div class="loc-custom"><input type="text" id="customLocation" placeholder="或输入自定义地点…"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">💭</span>心情</div>
        <div class="mood-grid" id="moodGrid"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">📝</span>备注（可选）</div>
        <textarea class="note-input" id="noteInput" placeholder="此刻的想法…"></textarea>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">📋</span>最近记录</div>
        <div class="recent-list" id="recentList"><div class="loading">加载中…</div></div>
      </div>
    </div>

    <div class="page" id="pageTrend">
      <div class="stat-row" id="trendStats"></div>
      <div class="card">
        <div class="card-title"><span class="icon">⏰</span>一天中何时最想抽</div>
        <div class="chart-wrap"><canvas id="chartHourly"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">📅</span>近7天抽烟量</div>
        <div class="chart-wrap"><canvas id="chartWeekly"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">💭</span>心情分布</div>
        <div class="chart-wrap"><canvas id="chartMood"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">📍</span>地点分布</div>
        <div class="chart-wrap"><canvas id="chartLocation"></canvas></div>
      </div>
    </div>

    <div class="page" id="pageReport">
      <div class="card">
        <div class="report-summary" id="reportSummary"></div>
      </div>
      <div class="report-tabs">
        <button class="report-tab active" onclick="switchReport('day')">日</button>
        <button class="report-tab" onclick="switchReport('month')">月</button>
        <button class="report-tab" onclick="switchReport('year')">年</button>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">📊</span><span id="reportChartTitle">今日详细</span></div>
        <div class="chart-wrap tall"><canvas id="chartReport"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">💬</span>本期总结</div>
        <div id="reportInsight" style="font-size:13px;color:var(--white-dim);line-height:1.7"></div>
      </div>
    </div>

    <div class="page" id="pageShare">
      <div class="card">
        <div class="card-title"><span class="icon">👥</span>参与者</div>
        <div class="share-users" id="shareUsers"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">📊</span>对比数据</div>
        <div class="share-compare" id="shareCompare"></div>
      </div>
      <div class="card">
        <div class="chart-wrap"><canvas id="chartCompare"></canvas></div>
      </div>
      <div class="card settings-section">
        <div class="card-title"><span class="icon">⚙️</span>设置</div>
        <div class="settings-row">
          <div><div class="s-label">我的昵称</div><div class="s-desc">修改后即时生效</div></div>
          <input type="text" id="user1Name" onchange="updateUserName('user1',this.value)">
        </div>
        <div class="settings-row">
          <div><div class="s-label">TA的昵称</div><div class="s-desc">邀请对方一起记录</div></div>
          <input type="text" id="user2Name" onchange="updateUserName('user2',this.value)">
        </div>
        <div class="settings-row">
          <div><div class="s-label">清空云端数据</div><div class="s-desc">不可恢复，请谨慎</div></div>
          <button class="btn btn-danger" onclick="clearAllData()">清空</button>
        </div>
      </div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-item active" onclick="switchPage('Record')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>记录</span>
    </div>
    <div class="nav-item" onclick="switchPage('Trend')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>趋势</span>
    </div>
    <div class="nav-item" onclick="switchPage('Report')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>报告</span>
    </div>
    <div class="nav-item" onclick="switchPage('Share')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <span>共享</span>
    </div>
  </div>
</div>

<script>
// ========== Supabase 配置 ==========
const SUPABASE_URL = 'https://whbbqtqmhwqmpsunlvaf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoYmJxdHFtaHdxbXBzdW5sdmFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDQyMDksImV4cCI6MjA5NTYyMDIwOX0.GavQQ2x577vKqaLnO4h0nJWtIXLk9zR3hpddSCjbQS4';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MOODS = [
  {key:'anxious',label:'焦虑',emoji:'😰'},
  {key:'bored',label:'无聊',emoji:'😐'},
  {key:'relaxed',label:'放松',emoji:'😌'},
  {key:'irritable',label:'烦躁',emoji:'😤'},
  {key:'stressed',label:'压力',emoji:'🤯'},
  {key:'habit',label:'习惯',emoji:'🤷'},
  {key:'social',label:'社交',emoji:'🍻'},
  {key:'sad',label:'低落',emoji:'😢'},
];

const CHART_COLORS = {
  blue:'rgba(74,158,255,0.85)',blueLight:'rgba(74,158,255,0.2)',
  purple:'rgba(192,132,252,0.85)',purpleLight:'rgba(192,132,252,0.2)',
  gridColor:'rgba(74,158,255,0.08)',tickColor:'rgba(107,137,168,0.6)',
};

// 用户信息存本地
let users = loadLocal('smoke_users', [
  {id:'user1',name:'我'},
  {id:'user2',name:'TA'},
]);
let currentUser = loadLocal('smoke_current_user', 'user1');
let selectedLocation = '';
let selectedMood = '';
let charts = {};
let allRecords = [];

function loadLocal(key, def) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; }
  catch(e) { return def; }
}
function saveLocal(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ========== 数据库操作 ==========
async function fetchRecords() {
  const { data, error } = await supabase.from('records').select('*').order('id', { ascending: false });
  if (error) { console.error('fetch error:', error); return []; }
  allRecords = data || [];
  return allRecords;
}

async function insertRecord(record) {
  const { data, error } = await supabase.from('records').insert([record]).select();
  if (error) { console.error('insert error:', error); showToast('保存失败，请检查网络'); return null; }
  return data;
}

async function deleteRecordById(id) {
  const { error } = await supabase.from('records').delete().eq('id', id);
  if (error) { console.error('delete error:', error); showToast('删除失败'); return false; }
  return true;
}

async function clearAllRecords() {
  const { error } = await supabase.from('records').delete().neq('id', 0);
  if (error) { console.error('clear error:', error); showToast('清空失败'); return false; }
  return true;
}

// ========== 页面切换 ==========
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((n, i) => {
    n.classList.toggle('active', ['Record','Trend','Report','Share'][i] === name);
  });
  if (name === 'Trend') renderTrend();
  if (name === 'Report') renderReport();
  if (name === 'Share') renderShare();
  if (name === 'Record') renderRecentList();
}

// ========== 初始化 ==========
async function init() {
  renderLocationGrid();
  renderMoodGrid();
  renderTopUserSwitch();
  await fetchRecords();
  renderRecentList();
}

function renderLocationGrid() {
  const g = document.getElementById('locationGrid');
  const locs = ['办公室','家里','阳台','楼道','路上','车里','酒吧','公园'];
  g.innerHTML = locs.map(l => `<button class="loc-btn${selectedLocation===l?' active':''}" onclick="selectLocation('${l}',this)">${l}</button>`).join('');
}
function selectLocation(loc, el) {
  selectedLocation = loc;
  document.getElementById('customLocation').value = '';
  document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function renderMoodGrid() {
  const g = document.getElementById('moodGrid');
  g.innerHTML = MOODS.map(m => `<button class="mood-btn${selectedMood===m.key?' active':''}" onclick="selectMood('${m.key}',this)"><span class="emoji">${m.emoji}</span>${m.label}</button>`).join('');
}
function selectMood(key, el) {
  selectedMood = key;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function renderTopUserSwitch() {
  const sw = document.getElementById('topUserSwitch');
  sw.innerHTML = users.map(u => `<button class="user-btn${currentUser===u.id?' active':''}" onclick="switchUser('${u.id}')">${u.name}</button>`).join('');
}
function switchUser(uid) {
  currentUser = uid;
  saveLocal('smoke_current_user', uid);
  renderTopUserSwitch();
  renderRecentList();
  showToast(`已切换到 ${users.find(u => u.id === uid).name}`);
}

// ========== 记录 ==========
async function addRecord() {
  const customLoc = document.getElementById('customLocation').value.trim();
  const location = customLoc || selectedLocation || '未标记';
  const mood = selectedMood || 'habit';
  const note = document.getElementById('noteInput').value.trim();
  const now = new Date();
  const u = users.find(u => u.id === currentUser);

  const record = {
    user_id: currentUser,
    user_name: u ? u.name : '我',
    time: now.toISOString(),
    location,
    mood,
    note
  };

  // 按钮动画
  const btn = document.getElementById('smokeBtn');
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.left = '50%'; ripple.style.top = '50%';
  ripple.style.transform = 'translate(-50%,-50%)';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  const result = await insertRecord(record);
  if (result) {
    const moodObj = MOODS.find(m => m.key === mood);
    showToast(`已记录 ${moodObj ? moodObj.emoji : ''} ${location}`);
    // 重置
    selectedLocation = ''; selectedMood = '';
    document.getElementById('noteInput').value = '';
    document.getElementById('customLocation').value = '';
    renderLocationGrid();
    renderMoodGrid();
    await fetchRecords();
    renderRecentList();
  }
}

async function renderRecentList() {
  const list = document.getElementById('recentList');
  const userRecords = allRecords.filter(r => r.user_id === currentUser).slice(0, 20);
  if (!userRecords.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🚬</div>还没有记录，点上面的按钮开始吧</div>';
    return;
  }
  list.innerHTML = userRecords.map(r => {
    const t = new Date(r.time);
    const ts = `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
    const mObj = MOODS.find(m => m.key === r.mood);
    return `<div class="recent-item">
      <div class="time">${ts}</div>
      <div class="emoji">${mObj ? mObj.emoji : '🤷'}</div>
      <div class="info"><div class="loc">${r.location}</div><div class="mood-label">${mObj ? mObj.label : '习惯'}${r.note ? ' · ' + r.note : ''}</div></div>
      <button class="del-btn" onclick="handleDelete(${r.id})">✕</button>
    </div>`;
  }).join('');
}

async function handleDelete(id) {
  const ok = await deleteRecordById(id);
  if (ok) {
    await fetchRecords();
    renderRecentList();
    showToast('已删除');
  }
}

// ========== 趋势页 ==========
function renderTrend() {
  const records = allRecords.filter(r => r.user_id === currentUser);
  const today = new Date();
  const todayStr = fmtDate(today);

  const todayCount = records.filter(r => fmtDate(new Date(r.time)) === todayStr).length;
  const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay());
  const weekCount = records.filter(r => new Date(r.time) >= weekStart).length;
  const monthCount = records.filter(r => { const d = new Date(r.time); return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth(); }).length;

  document.getElementById('trendStats').innerHTML = `
    <div class="stat-box"><div class="val">${todayCount}</div><div class="label">今日</div></div>
    <div class="stat-box"><div class="val">${weekCount}</div><div class="label">本周</div></div>
    <div class="stat-box"><div class="val">${monthCount}</div><div class="label">本月</div></div>`;

  // 小时分布
  const hourly = Array(24).fill(0);
  records.forEach(r => { hourly[new Date(r.time).getHours()]++; });
  renderBarChart('chartHourly','hourly', Array.from({length:24},(_,i)=>i+'时'), hourly, CHART_COLORS.blue);

  // 近7天
  const days=[];const dayCounts=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const ds=fmtDate(d);
    days.push(`${d.getMonth()+1}/${d.getDate()}`);
    dayCounts.push(records.filter(r=>fmtDate(new Date(r.time))===ds).length);
  }
  renderBarChart('chartWeekly','weekly',days,dayCounts,CHART_COLORS.blue);

  // 心情分布
  const moodCounts={};MOODS.forEach(m=>moodCounts[m.key]=0);
  records.forEach(r=>{if(moodCounts[r.mood]!==undefined)moodCounts[r.mood]++;});
  renderDoughnutChart('chartMood','mood',
    MOODS.map(m=>m.label),MOODS.map(m=>moodCounts[m.key]),
    ['#ff6b6b','#ffd93d','#4ecdc4','#ff8a5c','#a78bfa','#94a3b8','#f472b6','#60a5fa']);

  // 地点分布
  const locCounts={};
  records.forEach(r=>{locCounts[r.location]=(locCounts[r.location]||0)+1;});
  const locEntries=Object.entries(locCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const locColors=['#4a9eff','#7c5cff','#4ecdc4','#ffd93d','#ff6b6b','#f472b6','#94a3b8','#ff8a5c'];
  renderDoughnutChart('chartLocation','location',
    locEntries.map(e=>e[0]),locEntries.map(e=>e[1]),locColors);
}

// ========== 报告页 ==========
let reportMode = 'day';
function switchReport(mode) {
  reportMode = mode;
  document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderReport();
}

function renderReport() {
  const records = allRecords.filter(r => r.user_id === currentUser);
  const today = new Date();
  let periodRecords, periodLabel, chartLabels, chartData;

  if (reportMode === 'day') {
    const ds = fmtDate(today);
    periodRecords = records.filter(r => fmtDate(new Date(r.time)) === ds);
    periodLabel = '今天';
    const hourly = Array(24).fill(0);
    periodRecords.forEach(r => { hourly[new Date(r.time).getHours()]++; });
    chartLabels = Array.from({length:24},(_,i)=>i+'时');
    chartData = hourly;
  } else if (reportMode === 'month') {
    periodRecords = records.filter(r => { const d = new Date(r.time); return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth(); });
    periodLabel = `${today.getFullYear()}年${today.getMonth()+1}月`;
    const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
    const daily = Array(daysInMonth).fill(0);
    periodRecords.forEach(r => { const d = new Date(r.time).getDate(); daily[d-1]++; });
    chartLabels = Array.from({length:daysInMonth},(_,i)=>(i+1)+'日');
    chartData = daily;
  } else {
    periodRecords = records.filter(r => new Date(r.time).getFullYear() === today.getFullYear());
    periodLabel = `${today.getFullYear()}年`;
    const monthly = Array(12).fill(0);
    periodRecords.forEach(r => { monthly[new Date(r.time).getMonth()]++; });
    chartLabels = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    chartData = monthly;
  }

  const count = periodRecords.length;
  const moodCounts = {}; periodRecords.forEach(r => { moodCounts[r.mood] = (moodCounts[r.mood]||0)+1; });
  const topMood = Object.entries(moodCounts).sort((a,b) => b[1]-a[1])[0];
  const topMoodLabel = topMood ? MOODS.find(m => m.key === topMood[0]) : null;
  const locCounts = {}; periodRecords.forEach(r => { locCounts[r.location] = (locCounts[r.location]||0)+1; });
  const topLoc = Object.entries(locCounts).sort((a,b) => b[1]-a[1])[0];

  document.getElementById('reportSummary').innerHTML = `
    <div class="big-num">${count}</div>
    <div class="big-label">${periodLabel}抽烟数</div>
    <div class="sub-row">
      <div class="sub-item"><div class="sub-val">${topMoodLabel?topMoodLabel.emoji+' '+topMoodLabel.label:'—'}</div><div class="sub-label">主要心情</div></div>
      <div class="sub-item"><div class="sub-val">${topLoc?topLoc[0]:'—'}</div><div class="sub-label">主要地点</div></div>
    </div>`;

  document.getElementById('reportChartTitle').textContent = reportMode==='day'?'今日逐时分布':reportMode==='month'?'本月每日分布':'本年每月分布';
  renderBarChart('chartReport','report',chartLabels,chartData,CHART_COLORS.blue);

  let insight = '';
  if (count === 0) insight = `${periodLabel}还没有记录。`;
  else {
    const avgPerDay = reportMode==='day' ? count : (reportMode==='month' ? count/new Date(today.getFullYear(),today.getMonth()+1,0).getDate() : count/12);
    insight = `${periodLabel}共抽了 <b>${count}</b> 根烟。`;
    if (reportMode === 'day') {
      const peakHour = chartData.indexOf(Math.max(...chartData));
      insight += peakHour >= 0 ? ` 最想抽烟的时段是 <b>${peakHour}点</b>左右。` : '';
    }
    insight += topMoodLabel ? ` 主要情绪是 <b>${topMoodLabel.label}</b>，占了 ${Math.round(topMood[1]/count*100)}%。` : '';
    insight += topLoc ? ` 最常在 <b>${topLoc[0]}</b> 抽烟。` : '';
    if (avgPerDay > 10) insight += `<br><span style="color:var(--danger)">⚠️ 平均每天 ${avgPerDay.toFixed(1)} 根，偏高哦，注意身体。</span>`;
    else if (avgPerDay <= 3) insight += `<br><span style="color:var(--success)">✅ 平均每天 ${avgPerDay.toFixed(1)} 根，控制得不错！</span>`;
  }
  document.getElementById('reportInsight').innerHTML = insight;
}

// ========== 共享页 ==========
function renderShare() {
  document.getElementById('shareUsers').innerHTML = users.map(u => {
    const cnt = allRecords.filter(r => r.user_id === u.id).length;
    return `<div class="share-user-card${currentUser===u.id?' active':''}" onclick="switchUser('${u.id}');renderShare();">
      <div class="avatar">${u.name[0]}</div>
      <div class="uname">${u.name}</div>
      <div class="ucount">${cnt} 根</div>
    </div>`;
  }).join('');

  document.getElementById('user1Name').value = users[0].name;
  document.getElementById('user2Name').value = users[1].name;

  const today = new Date(); const ds = fmtDate(today);
  const u1Records = allRecords.filter(r => r.user_id === 'user1');
  const u2Records = allRecords.filter(r => r.user_id === 'user2');
  const u1Today = u1Records.filter(r => fmtDate(new Date(r.time)) === ds).length;
  const u2Today = u2Records.filter(r => fmtDate(new Date(r.time)) === ds).length;
  const u1Week = u1Records.filter(r => new Date(r.time) >= new Date(today.getTime()-7*86400000)).length;
  const u2Week = u2Records.filter(r => new Date(r.time) >= new Date(today.getTime()-7*86400000)).length;
  const u1Total = u1Records.length;
  const u2Total = u2Records.length;

  document.getElementById('shareCompare').innerHTML = `
    <div class="compare-box"><div class="cval u1-color">${u1Today}</div><div class="clabel">${users[0].name} 今日</div></div>
    <div class="compare-box"><div class="cval u2-color">${u2Today}</div><div class="clabel">${users[1].name} 今日</div></div>
    <div class="compare-box"><div class="cval u1-color">${u1Week}</div><div class="clabel">${users[0].name} 本周</div></div>
    <div class="compare-box"><div class="cval u2-color">${u2Week}</div><div class="clabel">${users[1].name} 本周</div></div>
    <div class="compare-box"><div class="cval u1-color">${u1Total}</div><div class="clabel">${users[0].name} 累计</div></div>
    <div class="compare-box"><div class="cval u2-color">${u2Total}</div><div class="clabel">${users[1].name} 累计</div></div>`;

  const days=[];const u1Data=[];const u2Data=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const dstr=fmtDate(d);
    days.push(`${d.getMonth()+1}/${d.getDate()}`);
    u1Data.push(u1Records.filter(r=>fmtDate(new Date(r.time))===dstr).length);
    u2Data.push(u2Records.filter(r=>fmtDate(new Date(r.time))===dstr).length);
  }
  renderGroupedBarChart('chartCompare','compare',days,u1Data,u2Data,users[0].name,users[1].name);
}

function updateUserName(uid, name) {
  if (!name.trim()) return;
  const u = users.find(u => u.id === uid);
  if (u) { u.name = name.trim(); saveLocal('smoke_users', users); renderTopUserSwitch(); renderShare(); showToast('昵称已更新'); }
}

async function clearAllData() {
  if (!confirm('确定要清空所有云端数据吗？此操作不可恢复！')) return;
  const ok = await clearAllRecords();
  if (ok) {
    await fetchRecords();
    renderRecentList();
    showToast('云端数据已清空');
  }
}

// ========== 图表工具 ==========
function chartDefaults() {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(17,29,51,0.95)', borderColor: 'rgba(74,158,255,0.3)', borderWidth: 1, titleColor: '#f0f4f8', bodyColor: '#b0c4d8', padding: 10, cornerRadius: 8 } },
    scales: {
      x: { grid: { color: CHART_COLORS.gridColor }, ticks: { color: CHART_COLORS.tickColor, font: { size: 10 } }, border: { color: 'rgba(74,158,255,0.1)' } },
      y: { grid: { color: CHART_COLORS.gridColor }, ticks: { color: CHART_COLORS.tickColor, font: { size: 10 }, stepSize: 1 }, border: { color: 'rgba(74,158,255,0.1)' }, beginAtZero: true }
    }
  };
}

function renderBarChart(canvasId, chartKey, labels, data, color) {
  if (charts[chartKey]) charts[chartKey].destroy();
  const ctx = document.getElementById(canvasId).getContext('2d');
  charts[chartKey] = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: color, borderRadius: 4, barThickness: labels.length > 15 ? 8 : 16 }] },
    options: chartDefaults()
  });
}

function renderDoughnutChart(canvasId, chartKey, labels, data, colors) {
  if (charts[chartKey]) charts[chartKey].destroy();
  const ctx = document.getElementById(canvasId).getContext('2d');
  charts[chartKey] = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: '#b0c4d8', font: { size: 11 }, padding: 8, usePointStyle: true, pointStyleWidth: 8 } }, tooltip: { backgroundColor: 'rgba(17,29,51,0.95)', borderColor: 'rgba(74,158,255,0.3)', borderWidth: 1, titleColor: '#f0f4f8', bodyColor: '#b0c4d8', padding: 10, cornerRadius: 8 } },
      cutout: '55%'
    }
  });
}

function renderGroupedBarChart(canvasId, chartKey, labels, data1, data2, name1, name2) {
  if (charts[chartKey]) charts[chartKey].destroy();
  const ctx = document.getElementById(canvasId).getContext('2d');
  const opts = chartDefaults();
  opts.plugins.legend = { display: true, labels: { color: '#b0c4d8', font: { size: 11 }, usePointStyle: true, pointStyleWidth: 8 } };
  charts[chartKey] = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [
      { label: name1, data: data1, backgroundColor: 'rgba(74,158,255,0.85)', borderRadius: 4, barThickness: 12 },
      { label: name2, data: data2, backgroundColor: 'rgba(192,132,252,0.85)', borderRadius: 4, barThickness: 12 },
    ] },
    options: opts
  });
}

// ========== 工具 ==========
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2100);
}

// ========== 启动 ==========
init();
</script>
